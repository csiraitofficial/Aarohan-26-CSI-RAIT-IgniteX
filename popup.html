<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      min-height: 200px;
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
    }

    header {
      background: #128C7E;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    header span {
      font-size: 20px;
    }

    #readBtn {
      display: block;
      width: calc(100% - 32px);
      margin: 14px 16px 0;
      padding: 10px;
      background: #25D366;
      color: #000;
      font-weight: 700;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    #readBtn:hover { background: #1ebe5a; }

    #status {
      font-size: 12px;
      color: #888;
      padding: 8px 16px;
      min-height: 24px;
    }

    #messages {
      max-height: 360px;
      overflow-y: auto;
      padding: 0 12px 12px;
    }

    .msg {
      margin: 6px 0;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
      max-width: 90%;
    }

    .msg.received {
      background: #1e1e1e;
      border-left: 3px solid #128C7E;
      align-self: flex-start;
    }

    .msg.sent {
      background: #1a2e22;
      border-left: 3px solid #25D366;
      margin-left: auto;
    }

    .msg .meta {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: #111; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <header>
    <span>💬</span>
    <h1>WA Message Reader</h1>
  </header>

  <button id="readBtn">READ MESSAGES</button>
  <div id="status">Open WhatsApp Web and click a chat first.</div>
  <div id="messages" class="msg-wrap"></div>

  <script src="popup.js"></script>
</body>
</html>
